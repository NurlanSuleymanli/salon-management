spring:
  application:
    name: SalonManager

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  datasource:
    url: jdbc:postgresql://localhost:5432/salon_booking
    username: postgres
    password: postgres


logging:
  level:
    org.springframework.security: DEBUG

server:
  port: 8080

